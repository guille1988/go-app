services:
  traefik:
    image: traefik:latest
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    ports:
      - "80:80"
      - "${TRAEFIK_DASHBOARD_PORT}:8080"
    volumes:
      - ${HOME}/.docker/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network

  auth:
    build:
      context: ../..
      dockerfile: infrastructure/local/auth/Dockerfile
    image: auth:latest
    container_name: auth
    volumes:
      - ../../microservices/auth:/auth
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      APP_NAME: ${AUTH_APP_NAME}
      APP_ENV: ${AUTH_APP_ENV}
      APP_HOST: ${AUTH_APP_HOST}
      APP_PORT: ${AUTH_APP_PORT}
      DB_DRIVER: ${AUTH_DB_DRIVER}
      DB_HOST: ${AUTH_DB_HOST}
      DB_PORT: ${AUTH_DB_PORT}
      DB_DATABASE: ${AUTH_DB_DATABASE}
      DB_USERNAME: ${AUTH_DB_USERNAME}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      DB_LOCAL_MAX_IDLE_CONNECTIONS: ${AUTH_DB_MAX_IDLE_CONNECTIONS}
      DB_LOCAL_MAX_OPEN_CONNECTIONS: ${AUTH_DB_MAX_OPEN_CONNECTIONS}
      LOG_DRIVER: ${AUTH_LOG_DRIVER}
      LOG_PATH: ${AUTH_LOG_PATH}
      LOG_LEVEL: ${AUTH_LOG_LEVEL}
      REDIS_HOST: ${AUTH_REDIS_HOST}
      REDIS_PORT: ${AUTH_REDIS_PORT}
      REDIS_PASSWORD: ${AUTH_REDIS_PASSWORD}
      REDIS_DATABASE: ${AUTH_REDIS_DATABASE}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_ACCESS_TOKEN_EXPIRE: ${AUTH_ACCESS_TOKEN_EXPIRE}
      AUTH_REFRESH_TOKEN_EXPIRE: ${AUTH_REFRESH_TOKEN_EXPIRE}
      AUTH_EMAIL_VERIFICATION_EXPIRE: ${AUTH_EMAIL_VERIFICATION_EXPIRE}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
    working_dir: /auth
    depends_on:
      mysql_auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.forward-auth.forwardauth.address=http://auth:${AUTH_APP_PORT}/api/auth/validate"
      - "traefik.http.middlewares.forward-auth.forwardauth.authResponseHeaders=X-User-UUID"
      - "traefik.http.routers.auth.rule=PathPrefix(`/api/auth`) || PathPrefix(`/api/stress`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.routers.auth.service=auth"
      - "traefik.http.services.auth.loadbalancer.server.port=${AUTH_APP_PORT}"
    networks:
      - app-network

  email:
    build:
      context: ../..
      dockerfile: infrastructure/local/email/Dockerfile
    image: email:latest
    container_name: email
    volumes:
      - ../../microservices/email:/email
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      APP_NAME: ${EMAIL_APP_NAME}
      APP_ENV: ${EMAIL_APP_ENV}
      DB_DRIVER: ${EMAIL_DB_DRIVER}
      DB_HOST: ${EMAIL_DB_HOST}
      DB_PORT: ${EMAIL_DB_PORT}
      DB_DATABASE: ${EMAIL_DB_DATABASE}
      DB_USERNAME: ${EMAIL_DB_USERNAME}
      DB_PASSWORD: ${EMAIL_DB_PASSWORD}
      DB_LOCAL_MAX_IDLE_CONNECTIONS: ${EMAIL_DB_MAX_IDLE_CONNECTIONS}
      DB_LOCAL_MAX_OPEN_CONNECTIONS: ${EMAIL_DB_MAX_OPEN_CONNECTIONS}
      LOG_DRIVER: ${EMAIL_LOG_DRIVER}
      LOG_PATH: ${EMAIL_LOG_PATH}
      LOG_LEVEL: ${EMAIL_LOG_LEVEL}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_REBALANCE_TIMEOUT_MS: ${EMAIL_KAFKA_REBALANCE_TIMEOUT_MS}
      KAFKA_WORKER_POOL_SIZE: ${EMAIL_KAFKA_WORKER_POOL_SIZE}
      MAIL_HOST: ${EMAIL_MAIL_HOST}
      MAIL_PORT: ${EMAIL_MAIL_PORT}
      MAIL_USER: ${EMAIL_MAIL_USER}
      MAIL_PASSWORD: ${EMAIL_MAIL_PASSWORD}
    working_dir: /email
    depends_on:
      mysql_email:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network

  broadcasting:
    build:
      context: ../..
      dockerfile: infrastructure/local/broadcasting/Dockerfile
    image: broadcasting:latest
    container_name: broadcasting
    volumes:
      - ../../microservices/broadcasting:/broadcasting
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      APP_NAME: ${BROADCASTING_APP_NAME}
      APP_ENV: ${BROADCASTING_APP_ENV}
      APP_HOST: ${BROADCASTING_APP_HOST}
      APP_PORT: ${BROADCASTING_APP_PORT}
      LOG_DRIVER: ${BROADCASTING_LOG_DRIVER}
      LOG_PATH: ${BROADCASTING_LOG_PATH}
      LOG_LEVEL: ${BROADCASTING_LOG_LEVEL}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_REBALANCE_TIMEOUT_MS: ${BROADCASTING_KAFKA_REBALANCE_TIMEOUT_MS}
      KAFKA_WORKER_POOL_SIZE: ${BROADCASTING_KAFKA_WORKER_POOL_SIZE}
    working_dir: /broadcasting
    depends_on:
      kafka:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.forward-auth.forwardauth.address=http://auth:${AUTH_APP_PORT}/api/auth/validate"
      - "traefik.http.middlewares.forward-auth.forwardauth.authResponseHeaders=X-User-UUID"
      - "traefik.http.routers.broadcasting.rule=PathPrefix(`/api/ws`)"
      - "traefik.http.routers.broadcasting.entrypoints=web"
      - "traefik.http.routers.broadcasting.middlewares=forward-auth"
      - "traefik.http.routers.broadcasting.service=broadcasting"
      - "traefik.http.services.broadcasting.loadbalancer.server.port=${BROADCASTING_APP_PORT}"
      - "traefik.http.services.broadcasting.loadbalancer.passHostHeader=true"
    networks:
      - app-network

  mysql_auth:
    image: mysql:8.0
    container_name: mysql_auth
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${AUTH_DB_DATABASE}
      MYSQL_USER: ${AUTH_DB_USERNAME}
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10
    networks:
      - app-network

  mysql_email:
    image: mysql:8.0
    container_name: mysql_email
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${EMAIL_DB_DATABASE}
      MYSQL_USER: ${EMAIL_DB_USERNAME}
      MYSQL_PASSWORD: ${EMAIL_DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_email_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: redis_auth
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_auth_data:/data
    networks:
      - app-network

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: always
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_NODE_ID: "${KAFKA_NODE_ID}"
      KAFKA_CLUSTER_ID: "${KAFKA_CLUSTER_ID}"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "${KAFKA_NUM_PARTITIONS}"
      KAFKA_NUM_NETWORK_THREADS: "8"
      KAFKA_NUM_IO_THREADS: "16"
      KAFKA_SOCKET_SEND_BUFFER_BYTES: "1048576"
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: "1048576"
      KAFKA_LOG_RETENTION_MS: "${KAFKA_LOG_RETENTION_MS}"
      KAFKA_LOG_SEGMENT_BYTES: "104857600"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 5s
      retries: 15
      start_period: 20s
    networks:
      - app-network

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: always
    environment:
      MP_MAX_MESSAGES: 0
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app-network

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_auth_data:
  mysql_email_data:
  redis_auth_data:
