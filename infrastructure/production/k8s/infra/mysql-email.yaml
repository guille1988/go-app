apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-email
  namespace: go-app
spec:
  serviceName: mysql-email
  replicas: 1
  selector:
    matchLabels:
      app: mysql-email
  template:
    metadata:
      labels:
        app: mysql-email
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: EMAIL_DB_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: EMAIL_DB_USERNAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: EMAIL_DB_PASSWORD
          ports:
            - containerPort: 3306
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: mysql-email-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mysql-email-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-email
  namespace: go-app
spec:
  selector:
    app: mysql-email
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-email-external
  namespace: go-app
spec:
  type: LoadBalancer
  selector:
    app: mysql-email
  ports:
    - port: 3307
      targetPort: 3306
