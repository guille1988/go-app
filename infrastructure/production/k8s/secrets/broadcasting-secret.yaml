apiVersion: v1
kind: Secret
metadata:
  name: broadcasting-secret
  namespace: go-app
stringData:
  APP_NAME: "broadcasting"
  APP_ENV: "production"
  APP_HOST: "0.0.0.0"
  APP_PORT: "8082"
  LOG_DRIVER: "stdout"
  LOG_PATH: ""
  LOG_LEVEL: "info"
  KAFKA_BROKERS: "kafka:9092"
  KAFKA_REBALANCE_TIMEOUT_MS: "600000"
  KAFKA_WORKER_POOL_SIZE: "20"
