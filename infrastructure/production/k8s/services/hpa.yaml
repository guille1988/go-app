apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: auth-scaledobject
  namespace: go-app
spec:
  scaleTargetRef:
    name: auth
  pollingInterval: 10
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 30
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.go-app.svc.cluster.local:9090
        metricName: http_rps_auth
        query: |
          sum(rate(http_requests_total{kubernetes_pod_label_app="auth",kubernetes_namespace="go-app",path!="/metrics",path!="/api/health"}[30s]))
        threshold: "500"
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Pods
              value: 4
              periodSeconds: 15
        scaleDown:
          stabilizationWindowSeconds: 60
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: email-scaledobject
  namespace: go-app
spec:
  scaleTargetRef:
    name: email
  pollingInterval: 10
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 60
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka.go-app.svc.cluster.local:9092
        consumerGroup: email.service
        topic: stress.test
        lagThreshold: "100"
        offsetResetPolicy: latest
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Pods
              value: 4
              periodSeconds: 15
        scaleDown:
          stabilizationWindowSeconds: 60
